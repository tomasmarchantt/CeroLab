      <path d="M675 284C706 390 706 651 683 802" stroke="#1B0C05" stroke-opacity="0.20" stroke-width="20" stroke-linecap="round"/>
      <path d="M707 445C714 545 713 673 698 778" stroke="#FFF0BC" stroke-opacity="0.18" stroke-width="7" stroke-linecap="round"/>
