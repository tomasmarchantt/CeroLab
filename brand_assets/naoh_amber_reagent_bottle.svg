<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <linearGradient id="glassAmber" x1="250" y1="130" x2="790" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D7A95E" stop-opacity="0.28"/>
      <stop offset="0.22" stop-color="#9A6127" stop-opacity="0.42"/>
      <stop offset="0.58" stop-color="#5C3216" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#2B160A" stop-opacity="0.64"/>
    </linearGradient>
    <linearGradient id="glassEdge" x1="276" y1="185" x2="770" y2="850" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF7DD" stop-opacity="0.75"/>
      <stop offset="0.3" stop-color="#E7B76F" stop-opacity="0.16"/>
      <stop offset="0.7" stop-color="#1E0E05" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FFF0C0" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="capGrad" x1="370" y1="70" x2="650" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.35" stop-color="#EDEDED"/>
      <stop offset="0.7" stop-color="#BFC2C5"/>
      <stop offset="1" stop-color="#7F858B"/>
    </linearGradient>
    <linearGradient id="capRib" x1="390" y1="84" x2="633" y2="178" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F9FAFA"/>
      <stop offset="1" stop-color="#AEB3B8"/>
    </linearGradient>
    <linearGradient id="liquidClear" x1="290" y1="490" x2="740" y2="820" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#CFFAFF" stop-opacity="0.14"/>
      <stop offset="0.55" stop-color="#E8FFFF" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#B7F4FF" stop-opacity="0.16"/>
    </linearGradient>
    <linearGradient id="labelGrad" x1="330" y1="420" x2="700" y2="665" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.55" stop-color="#F3F5EF"/>
      <stop offset="1" stop-color="#DCDDCF"/>
    </linearGradient>
    <filter id="softShadow" x="140" y="50" width="760" height="910" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <filter id="innerGlow" x="220" y="160" width="600" height="710" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.9  0 1 0 0 0.55  0 0 1 0 0.18  0 0 0 0.28 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
    <clipPath id="bottleClip">
      <path d="M410 178C410 158 426 142 446 142H578C598 142 614 158 614 178V286C614 318 635 344 662 364C705 395 730 446 730 502V772C730 840 675 895 607 895H417C349 895 294 840 294 772V502C294 446 319 395 362 364C389 344 410 318 410 286V178Z"/>
    </clipPath>
  </defs>

  <rect width="1024" height="1024" fill="none"/>
