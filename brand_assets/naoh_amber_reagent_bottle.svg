    <path d="M418 251H606" stroke="#160A05" stroke-opacity="0.18" stroke-width="7" stroke-linecap="round"/>
    <path d="M408 295H616" stroke="#FFD58B" stroke-opacity="0.22" stroke-width="7" stroke-linecap="round"/>

    <!-- Cap -->
    <path d="M386 86C386 67 402 52 421 52H603C622 52 638 67 638 86V161C638 182 621 199 600 199H424C403 199 386 182 386 161V86Z" fill="url(#capGrad)" stroke="#FFFFFF" stroke-opacity="0.38" stroke-width="4"/>
    <path d="M397 76H627V184H397V76Z" fill="url(#capRib)" opacity="0.36"/>
    <g opacity="0.35">
      <path d="M415 62V190" stroke="#80878E" stroke-width="5"/>
      <path d="M446 58V194" stroke="#7E858C" stroke-width="5"/>
      <path d="M478 57V196" stroke="#7E858C" stroke-width="5"/>
      <path d="M511 56V197" stroke="#7E858C" stroke-width="5"/>
      <path d="M544 57V196" stroke="#7E858C" stroke-width="5"/>
      <path d="M576 58V194" stroke="#7E858C" stroke-width="5"/>
      <path d="M609 62V190" stroke="#7E858C" stroke-width="5"/>
    </g>
    <path d="M404 70C462 51 565 52 621 72" stroke="#FFFFFF" stroke-opacity="0.75" stroke-width="8" stroke-linecap="round"/>
    <path d="M397 181C456 196 571 198 626 181" stroke="#7E858C" stroke-opacity="0.4" stroke-width="6" stroke-linecap="round"/>

    <!-- label -->
    <g transform="translate(0 0)">
      <path d="M331 427C331 407 347 391 367 391H657C677 391 693 407 693 427V648C693 668 677 684 657 684H367C347 684 331 668 331 648V427Z" fill="url(#labelGrad)" stroke="#FFFFFF" stroke-width="5"/>
      <path d="M352 414H672" stroke="#CABF9D" stroke-opacity="0.65" stroke-width="3"/>
      <path d="M352 662H672" stroke="#CABF9D" stroke-opacity="0.65" stroke-width="3"/>
      <text x="512" y="520" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="104" font-weight="800" fill="#1D211E" letter-spacing="-2">NaOH</text>
      <text x="512" y="585" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="33" font-weight="650" fill="#3D443F">Sodium Hydroxide</text>
      <rect x="375" y="614" width="274" height="10" rx="5" fill="#1B5E3F" fill-opacity="0.72"/>
    </g>

    <!-- outer glass highlights -->
    <path d="M410 178C410 158 426 142 446 142H578C598 142 614 158 614 178V286C614 318 635 344 662 364C705 395 730 446 730 502V772C730 840 675 895 607 895H417C349 895 294 840 294 772V502C294 446 319 395 362 364C389 344 410 318 410 286V178Z" fill="none" stroke="url(#glassEdge)" stroke-width="6"/>
    <path d="M345 410C324 488 322 687 343 771C357 828 393 856 427 866" stroke="#FFF6D3" stroke-opacity="0.32" stroke-width="12" stroke-linecap="round"/>
    <path d="M658 395C692 468 697 677 668 794" stroke="#FFFFFF" stroke-opacity="0.16" stroke-width="8" stroke-linecap="round"/>
  </g>
  <ellipse cx="512" cy="924" rx="205" ry="31" fill="#000000" fill-opacity="0.18"/>
