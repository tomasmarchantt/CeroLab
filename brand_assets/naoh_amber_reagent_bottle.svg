    <path d="M410 178C410 158 426 142 446 142H578C598 142 614 158 614 178V286C614 318 635 344 662 364C705 395 730 446 730 502V772C730 840 675 895 607 895H417C349 895 294 840 294 772V502C294 446 319 395 362 364C389 344 410 318 410 286V178Z" fill="url(#glassAmber)" stroke="#E2A75B" stroke-opacity="0.38" stroke-width="9"/>

    <!-- clear solution inside amber bottle -->
    <g clip-path="url(#bottleClip)">
