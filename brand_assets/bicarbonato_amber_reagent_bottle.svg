<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 640" width="512" height="640" role="img" aria-label="Bicarbonato reagent bottle">
  <defs>
    <linearGradient id="glassAmber" x1="120" y1="80" x2="390" y2="590" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f3c36a" stop-opacity="0.26"/>
      <stop offset="0.18" stop-color="#b77725" stop-opacity="0.34"/>
      <stop offset="0.45" stop-color="#7d4418" stop-opacity="0.46"/>
      <stop offset="0.72" stop-color="#a86622" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#3b1f0e" stop-opacity="0.52"/>
    </linearGradient>
    <linearGradient id="glassEdge" x1="92" y1="120" x2="430" y2="612" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff6dc" stop-opacity="0.70"/>
      <stop offset="0.22" stop-color="#d9963f" stop-opacity="0.16"/>
      <stop offset="0.55" stop-color="#2a1609" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#fff2c6" stop-opacity="0.28"/>
    </linearGradient>
    <linearGradient id="capGrad" x1="170" y1="18" x2="342" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.22" stop-color="#e8e8e2"/>
      <stop offset="0.56" stop-color="#b7b7ad"/>
      <stop offset="1" stop-color="#f8f8f1"/>
    </linearGradient>
    <linearGradient id="labelGrad" x1="139" y1="285" x2="374" y2="455" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fffdf2"/>
      <stop offset="0.55" stop-color="#eee6d2"/>
      <stop offset="1" stop-color="#d9ccb2"/>
    </linearGradient>
    <linearGradient id="liquidClear" x1="140" y1="240" x2="370" y2="570" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f7fff9" stop-opacity="0.22"/>
      <stop offset="0.50" stop-color="#dff7e6" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.20"/>
    </linearGradient>
    <radialGradient id="bodyGlow" cx="36%" cy="26%" r="64%">
      <stop offset="0" stop-color="#fff8cf" stop-opacity="0.55"/>
      <stop offset="0.42" stop-color="#c9812e" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#2b1406" stop-opacity="0.10"/>
    </radialGradient>
    <filter id="softShadow" x="-25%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.30"/>
    </filter>
    <filter id="innerBlur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.45"/>
    </filter>
  </defs>

  <ellipse cx="256" cy="604" rx="139" ry="22" fill="#000" opacity="0.18"/>

  <g filter="url(#softShadow)">
    <!-- cap -->
    <path d="M174 52c0-19 15-34 34-34h96c19 0 34 15 34 34v71H174V52Z" fill="url(#capGrad)" stroke="#8f8d83" stroke-width="4"/>
    <path d="M169 119h174c10 0 18 8 18 18v18c0 10-8 18-18 18H169c-10 0-18-8-18-18v-18c0-10 8-18 18-18Z" fill="#d9d9d0" stroke="#8f8d83" stroke-width="4"/>
    <path d="M190 35h132" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.55"/>
    <g opacity="0.45">
      <path d="M188 54v58M211 49v64M234 47v66M257 46v66M280 47v66M303 49v64M326 54v58" stroke="#8c8a82" stroke-width="3"/>
    </g>

    <!-- neck -->
    <path d="M194 166h124c7 0 13 6 13 13v70H181v-70c0-7 6-13 13-13Z" fill="url(#glassAmber)" stroke="#7b4318" stroke-opacity="0.50" stroke-width="5"/>
    <path d="M204 179h27v63" stroke="#fff6d4" stroke-width="8" stroke-linecap="round" opacity="0.26"/>

    <!-- bottle body -->
    <path d="M157 237c0-17 14-31 31-31h136c17 0 31 14 31 31l54 300c5 28-17 54-45 54H148c-28 0-50-26-45-54l54-300Z" fill="url(#glassAmber)" stroke="#6e3a14" stroke-opacity="0.55" stroke-width="6"/>
    <path d="M157 237c0-17 14-31 31-31h136c17 0 31 14 31 31l54 300c5 28-17 54-45 54H148c-28 0-50-26-45-54l54-300Z" fill="url(#bodyGlow)" opacity="0.75"/>

    <!-- internal clear solution -->
    <path d="M138 374h236l31 167c4 20-12 39-33 39H140c-21 0-37-19-33-39l31-167Z" fill="url(#liquidClear)" opacity="0.72"/>
    <ellipse cx="256" cy="374" rx="118" ry="17" fill="#fafffb" opacity="0.18"/>

    <!-- glass highlights -->
    <path d="M178 226c-13 96-34 204-47 309-3 23 9 39 27 42" fill="none" stroke="#fff8da" stroke-width="10" stroke-linecap="round" opacity="0.30"/>
    <path d="M209 220c-8 73-25 163-32 245" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" opacity="0.22"/>
    <path d="M355 260c23 111 38 196 51 277" fill="none" stroke="#fff0b8" stroke-width="7" stroke-linecap="round" opacity="0.18"/>
    <path d="M121 555c32 23 231 27 271 0" fill="none" stroke="#fff4ca" stroke-width="5" opacity="0.20"/>
    <path d="M157 237c0-17 14-31 31-31h136c17 0 31 14 31 31l54 300c5 28-17 54-45 54H148c-28 0-50-26-45-54l54-300Z" fill="none" stroke="url(#glassEdge)" stroke-width="3" opacity="0.9"/>

    <!-- label -->
    <g>
      <path d="M139 310c3-18 18-31 36-31h162c18 0 33 13 36 31l16 105c4 25-16 47-41 47H164c-25 0-45-22-41-47l16-105Z" fill="url(#labelGrad)" stroke="#b8aa8f" stroke-width="4"/>
      <path d="M158 305c7-7 18-11 31-11h133" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.55"/>
      <line x1="156" y1="350" x2="356" y2="350" stroke="#c9b894" stroke-width="2" opacity="0.75"/>
      <line x1="165" y1="414" x2="347" y2="414" stroke="#c9b894" stroke-width="2" opacity="0.65"/>
      <text x="256" y="337" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="800" fill="#2b2418" letter-spacing="1.2">Bicarbonato</text>
      <text x="256" y="395" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="900" fill="#1f1a12" letter-spacing="1.5">NaHCO₃</text>
      <text x="256" y="439" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="650" fill="#5d513d">Sodium Bicarbonate</text>
    </g>
  </g>
</svg>
