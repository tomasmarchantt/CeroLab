<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1300" viewBox="0 0 900 1300">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e8e4d6"/>
      <stop offset="0.16" stop-color="#fffbed"/>
      <stop offset="0.48" stop-color="#f4efd9"/>
      <stop offset="0.78" stop-color="#d9d2bd"/>
      <stop offset="1" stop-color="#fdf9e9"/>
    </linearGradient>
    <linearGradient id="capGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1f3340"/>
      <stop offset="0.45" stop-color="#314b5c"/>
      <stop offset="1" stop-color="#14242e"/>
    </linearGradient>
    <linearGradient id="rubberGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1a2c36"/>
      <stop offset="0.5" stop-color="#425b68"/>
      <stop offset="1" stop-color="#152630"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b9f070"/>
      <stop offset="0.45" stop-color="#7bc44a"/>
      <stop offset="1" stop-color="#315e2c"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#536070"/>
      <stop offset="1" stop-color="#2d3542"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="25" stdDeviation="28" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <filter id="softInner" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.7"/>
    </filter>
    <radialGradient id="btnGrad" cx="35%" cy="25%" r="70%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.45" stop-color="#d8dde3"/>
      <stop offset="1" stop-color="#87909b"/>
    </radialGradient>
  </defs>

  <rect width="900" height="1300" fill="none"/>

  <g id="ph-meter-pen" filter="url(#shadow)">
    <!-- hanging loop -->
    <path d="M443 82 C443 46 457 36 477 36 C498 36 511 48 511 82" fill="none" stroke="#263743" stroke-width="20" stroke-linecap="round"/>

    <!-- top cap -->
    <path d="M323 92 C323 63 346 49 374 49 L580 49 C608 49 631 63 631 92 L631 164 C631 187 612 203 589 203 L365 203 C342 203 323 187 323 164 Z" fill="url(#capGrad)"/>
    <path d="M339 77 C363 61 591 60 615 77" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="10" stroke-linecap="round"/>
    <rect x="332" y="160" width="289" height="18" rx="8" fill="#0e1b22" opacity="0.38"/>

    <!-- main body -->
    <path d="M339 185 C319 207 307 232 307 270 L307 842 C307 889 334 930 374 948 L389 1154 C391 1195 425 1227 466 1227 L488 1227 C529 1227 563 1195 565 1154 L580 948 C620 930 647 889 647 842 L647 270 C647 232 635 207 615 185 Z" fill="url(#bodyGrad)"/>

    <!-- side shadows -->
    <path d="M326 242 C315 313 317 802 330 880 C341 934 386 958 386 958 L399 1137 C403 1174 421 1205 449 1218 C408 1213 377 1188 373 1149 L359 951 C320 930 294 891 294 843 L294 268 C294 231 308 204 326 185 Z" fill="#9c9684" opacity="0.18"/>
    <path d="M622 220 C638 281 636 800 620 876 C608 929 565 956 565 956 L551 1148 C548 1182 529 1209 499 1220 C543 1216 579 1183 581 1148 L594 949 C635 930 660 889 660 842 L660 269 C660 232 644 204 622 185 Z" fill="#ffffff" opacity="0.28"/>

    <!-- lower rubber ring -->
    <path d="M355 802 L599 802 L599 903 C599 921 584 936 566 936 L388 936 C370 936 355 921 355 903 Z" fill="url(#rubberGrad)"/>
    <g opacity="0.35" stroke="#0c151b" stroke-width="7">
      <line x1="386" y1="812" x2="386" y2="926"/>
      <line x1="426" y1="812" x2="426" y2="936"/>
      <line x1="467" y1="812" x2="467" y2="936"/>
      <line x1="508" y1="812" x2="508" y2="936"/>
      <line x1="549" y1="812" x2="549" y2="926"/>
    </g>
    <rect x="355" y="802" width="244" height="20" rx="7" fill="#617985" opacity="0.35"/>

    <!-- central dark control panel -->
    <path d="M354 264 C354 244 370 228 390 228 L564 228 C584 228 600 244 600 264 L600 704 C600 724 584 740 564 740 L390 740 C370 740 354 724 354 704 Z" fill="url(#panelGrad)"/>
    <path d="M371 251 C387 238 563 238 583 253" fill="none" stroke="#ffffff" stroke-opacity="0.16" stroke-width="8" stroke-linecap="round"/>

    <!-- screen bevel -->
    <rect x="384" y="268" width="186" height="238" rx="18" fill="#1b2630"/>
    <rect x="397" y="282" width="160" height="210" rx="11" fill="url(#screenGrad)"/>
    <rect x="406" y="291" width="142" height="192" rx="8" fill="#78c553" opacity="0.45"/>
    <path d="M410 292 L552 292 L410 483 Z" fill="#ffffff" opacity="0.12"/>

    <!-- screen markings -->
    <text x="477" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#1d3921" font-weight="700">TDS/pH/TEMP</text>
    <text x="423" y="350" font-family="Arial, sans-serif" font-size="20" fill="#1d3921">pH</text>
    <text x="515" y="350" font-family="Arial, sans-serif" font-size="16" fill="#1d3921">°C</text>
    <text id="ph-value" x="478" y="425" text-anchor="middle" font-family="Digital-7, monospace" font-size="104" fill="#122617" font-weight="700">7.0</text>
    <text x="479" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="27" fill="#15311b" font-weight="700">25.0°C</text>

    <!-- buttons -->
    <g id="buttons">
      <circle cx="477" cy="554" r="33" fill="url(#btnGrad)" stroke="#1f2933" stroke-width="3"/>
      <text x="477" y="561" text-anchor="middle" font-family="Arial" font-size="17" fill="#23313b" font-weight="700">ON</text>
      <circle cx="477" cy="628" r="31" fill="url(#btnGrad)" stroke="#1f2933" stroke-width="3"/>
      <text x="477" y="634" text-anchor="middle" font-family="Arial" font-size="15" fill="#23313b" font-weight="700">MODE</text>
      <circle cx="477" cy="700" r="31" fill="url(#btnGrad)" stroke="#1f2933" stroke-width="3"/>
      <text x="477" y="706" text-anchor="middle" font-family="Arial" font-size="16" fill="#23313b" font-weight="700">CAL</text>
    </g>

    <!-- body highlights -->
    <path d="M365 207 C342 270 345 793 360 875 C371 922 407 928 407 928" fill="none" stroke="#ffffff" stroke-width="15" stroke-opacity="0.32" stroke-linecap="round" filter="url(#softInner)"/>
    <path d="M548 210 C585 305 577 738 562 786" fill="none" stroke="#ffffff" stroke-width="10" stroke-opacity="0.22" stroke-linecap="round"/>
    <ellipse cx="477" cy="1242" rx="150" ry="23" fill="#000" opacity="0.13"/>
  </g>
</svg>
