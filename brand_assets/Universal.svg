<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.22"/>
    </filter>
    <filter id="paperShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="11" stdDeviation="10" flood-color="#8b6a00" flood-opacity="0.28"/>
    </filter>
    <linearGradient id="cardBg" x1="0" y1="0" x2="1200" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#eee8d5"/>
      <stop offset="0.55" stop-color="#dfd7c2"/>
      <stop offset="1" stop-color="#d1c7ad"/>
    </linearGradient>
    <linearGradient id="cardBorder" x1="0" y1="0" x2="0" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff9e9"/>
      <stop offset="1" stop-color="#bcb192"/>
    </linearGradient>
    <linearGradient id="strip" x1="0" y1="0" x2="450" y2="330" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffe426"/>
      <stop offset="0.48" stop-color="#f8cc12"/>
      <stop offset="1" stop-color="#d49c00"/>
    </linearGradient>
    <linearGradient id="stripEdge" x1="0" y1="0" x2="20" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#c28a00" stop-opacity="0"/>
      <stop offset="1" stop-color="#8d6200" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="gloss" x1="70" y1="160" x2="440" y2="410" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff6a4" stop-opacity="0.45"/>
      <stop offset="0.35" stop-color="#fff6a4" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#fff6a4" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect x="22" y="18" width="1156" height="650" rx="30" fill="url(#cardBg)" stroke="#c7bea2" stroke-width="7" filter="url(#softShadow)"/>
  <rect x="42" y="45" width="1116" height="596" rx="22" stroke="url(#cardBorder)" stroke-width="3" opacity="0.95"/>

  <text x="600" y="88" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="700" letter-spacing="18" fill="#676258">pH COLOR SCALE</text>

  <!-- left paper pad -->
  <g filter="url(#paperShadow)">
    <rect x="70" y="155" width="452" height="402" rx="5" fill="url(#strip)"/>
    <rect x="70" y="155" width="452" height="402" rx="5" fill="url(#gloss)"/>
    <rect x="503" y="155" width="19" height="402" fill="url(#stripEdge)"/>
    <path d="M70 250H522" stroke="#ad8104" stroke-width="5" opacity="0.52"/>
    <path d="M70 353H522" stroke="#ad8104" stroke-width="5" opacity="0.48"/>
    <path d="M70 456H522" stroke="#ad8104" stroke-width="5" opacity="0.48"/>
    <path d="M76 164H516" stroke="#fff47b" stroke-width="5" opacity="0.45"/>
    <path d="M72 555H516" stroke="#a37100" stroke-width="3" opacity="0.45"/>
  </g>

  <!-- scale swatches shifted left to fit inside the card border -->
  <g transform="translate(-65 0)" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="500" fill="#5f5a51" text-anchor="middle">
    <g>
      <rect x="640" y="150" width="84" height="136" rx="9" fill="#ff2535"/>
      <rect x="640" y="150" width="84" height="136" rx="9" fill="url(#gloss)" opacity="0.15"/>
      <text x="682" y="348">1–2</text>
    </g>
    <g>
      <rect x="790" y="150" width="84" height="136" rx="9" fill="#ff950b"/>
      <rect x="790" y="150" width="84" height="136" rx="9" fill="url(#gloss)" opacity="0.12"/>
      <text x="832" y="348">3–4</text>
    </g>
    <g>
      <rect x="940" y="150" width="84" height="136" rx="9" fill="#ffdc18"/>
      <rect x="940" y="150" width="84" height="136" rx="9" fill="url(#gloss)" opacity="0.16"/>
      <text x="982" y="348">5–6</text>
    </g>
    <g>
      <rect x="640" y="410" width="84" height="136" rx="9" fill="#9ad32a"/>
      <rect x="640" y="410" width="84" height="136" rx="9" fill="url(#gloss)" opacity="0.12"/>
      <text x="682" y="608">6–7</text>
    </g>
    <g>
      <rect x="790" y="410" width="84" height="136" rx="9" fill="#45b94d"/>
      <rect x="790" y="410" width="84" height="136" rx="9" fill="url(#gloss)" opacity="0.12"/>
      <text x="832" y="608">7–8</text>
    </g>
    <g>
      <rect x="940" y="410" width="84" height="136" rx="9" fill="#3498c9"/>
      <rect x="940" y="410" width="84" height="136" rx="9" fill="url(#gloss)" opacity="0.14"/>
      <text x="982" y="608">9–10</text>
    </g>
    <g>
      <rect x="1090" y="150" width="84" height="136" rx="9" fill="#173b89"/>
      <rect x="1090" y="150" width="84" height="136" rx="9" fill="url(#gloss)" opacity="0.17"/>
      <text x="1132" y="348">11–12</text>
    </g>
    <g>
      <rect x="1090" y="410" width="84" height="136" rx="9" fill="#5c23a8"/>
      <rect x="1090" y="410" width="84" height="136" rx="9" fill="url(#gloss)" opacity="0.12"/>
      <text x="1132" y="608">13–14</text>
    </g>
  </g>

  <!-- subtle grain/dust dots for realism -->
  <g opacity="0.18" fill="#8c836f">
    <circle cx="109" cy="113" r="1.4"/><circle cx="214" cy="596" r="1.2"/><circle cx="558" cy="142" r="1.1"/><circle cx="1050" cy="85" r="1.2"/><circle cx="1126" cy="636" r="1.1"/><circle cx="455" cy="97" r="1.2"/><circle cx="319" cy="625" r="1"/>
  </g>
</svg>
