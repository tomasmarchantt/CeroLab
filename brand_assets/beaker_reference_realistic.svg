<svg width="1200" height="1600" viewBox="0 0 1200 1600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="28" stdDeviation="26" flood-color="#000000" flood-opacity="0.20"/>
    </filter>
    <filter id="innerBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>
    <filter id="glassGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#ffffff" flood-opacity="0.55"/>
    </filter>
    <linearGradient id="glassBody" x1="224" y1="228" x2="973" y2="1261" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.62"/>
      <stop offset="0.12" stop-color="#dfe8ee" stop-opacity="0.18"/>
      <stop offset="0.36" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="0.62" stop-color="#a9bbc7" stop-opacity="0.09"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.42"/>
    </linearGradient>
    <linearGradient id="edgeStroke" x1="253" y1="292" x2="949" y2="1238" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="0.23" stop-color="#7f8c93" stop-opacity="0.70"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="0.78" stop-color="#65737d" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="rimGrad" x1="262" y1="266" x2="932" y2="332" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#87929a" stop-opacity="0.6"/>
      <stop offset="0.18" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="0.52" stop-color="#cfd8de" stop-opacity="0.25"/>
      <stop offset="0.82" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#67747e" stop-opacity="0.7"/>
    </linearGradient>
    <radialGradient id="bottomGlass" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 1217) rotate(90) scale(78 335)">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.62"/>
      <stop offset="0.42" stop-color="#c8d2d9" stop-opacity="0.22"/>
      <stop offset="0.75" stop-color="#82909a" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.68"/>
    </radialGradient>
    <linearGradient id="highlight" x1="347" y1="308" x2="347" y2="1168" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.88"/>
      <stop offset="0.42" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.62"/>
    </linearGradient>
    <linearGradient id="rightHighlight" x1="853" y1="318" x2="853" y2="1140" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.65"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.46"/>
    </linearGradient>
    <linearGradient id="scaleInk" x1="677" y1="440" x2="861" y2="953" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#23272a" stop-opacity="0.86"/>
      <stop offset="1" stop-color="#475059" stop-opacity="0.70"/>
    </linearGradient>
    <clipPath id="liquidClip">
      <path d="M266 336C272 453 277 706 283 1024C286 1178 336 1230 600 1230C864 1230 914 1178 917 1024C923 706 928 453 934 336C895 357 317 357 266 336Z"/>
    </clipPath>
  </defs>

  <rect width="1200" height="1600" fill="transparent"/>

  <!-- Ground reflection/shadow -->
  <ellipse cx="600" cy="1288" rx="374" ry="64" fill="#1b242a" opacity="0.16" filter="url(#innerBlur)"/>
  <ellipse cx="600" cy="1272" rx="314" ry="32" fill="#ffffff" opacity="0.23" filter="url(#innerBlur)"/>

  <!-- Beaker body silhouette -->
  <g filter="url(#softShadow)">
    <path d="M260 331C271 473 274 789 283 1033C287 1158 307 1217 422 1248C463 1259 523 1264 600 1264C677 1264 737 1259 778 1248C893 1217 913 1158 917 1033C926 789 929 473 940 331C902 363 300 363 260 331Z" fill="url(#glassBody)"/>
    <path d="M260 331C271 473 274 789 283 1033C287 1158 307 1217 422 1248C463 1259 523 1264 600 1264C677 1264 737 1259 778 1248C893 1217 913 1158 917 1033C926 789 929 473 940 331C902 363 300 363 260 331Z" stroke="url(#edgeStroke)" stroke-width="9" stroke-linejoin="round"/>
  </g>

  <!-- Dynamic liquid target: Claude can edit these IDs -->
  <g id="liquid-layer" clip-path="url(#liquidClip)" opacity="1">
    <path id="liquid-fill" d="M286 1048C372 1018 467 1078 565 1044C684 1002 775 1068 913 1032V1238H286V1048Z" fill="transparent"/>
    <path id="liquid-surface" d="M286 1048C372 1018 467 1078 565 1044C684 1002 775 1068 913 1032" stroke="transparent" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- Rear interior wall / refraction panels -->
  <path d="M307 382C309 536 312 843 319 1044C322 1146 363 1186 433 1204" stroke="#ffffff" stroke-opacity="0.34" stroke-width="11" stroke-linecap="round"/>
  <path d="M883 382C881 536 878 843 871 1044C868 1146 827 1186 757 1204" stroke="#53606a" stroke-opacity="0.28" stroke-width="10" stroke-linecap="round"/>
  <rect x="388" y="355" width="96" height="786" rx="46" fill="#ffffff" opacity="0.115"/>
  <rect x="742" y="367" width="82" height="750" rx="41" fill="#ffffff" opacity="0.10"/>
  <path d="M516 354V1184" stroke="#ffffff" stroke-opacity="0.18" stroke-width="5"/>
  <path d="M690 354V1182" stroke="#7d8992" stroke-opacity="0.16" stroke-width="5"/>

  <!-- Rim: realistic elliptical lip + pour spout -->
  <path d="M242 320C242 284 399 256 593 256C781 256 935 284 949 320C954 333 947 346 926 357C847 396 353 394 274 358C257 351 247 342 242 320Z" fill="#ffffff" fill-opacity="0.22" stroke="url(#rimGrad)" stroke-width="8"/>
  <path d="M258 317C323 291 441 279 596 279C752 279 872 292 927 318" stroke="#22303a" stroke-opacity="0.62" stroke-width="5" stroke-linecap="round"/>
  <path d="M264 331C332 351 872 352 929 329" stroke="#ffffff" stroke-opacity="0.82" stroke-width="5" stroke-linecap="round"/>
  <path d="M242 320C222 324 200 333 178 351C214 354 245 350 275 335C264 333 252 329 242 320Z" fill="#f7fbff" fill-opacity="0.42" stroke="#7b8790" stroke-opacity="0.75" stroke-width="7" stroke-linejoin="round"/>
  <path d="M181 351C214 348 241 342 260 331" stroke="#ffffff" stroke-opacity="0.8" stroke-width="4" stroke-linecap="round"/>

  <!-- Bottom glass thickness -->
  <ellipse cx="600" cy="1208" rx="298" ry="67" fill="url(#bottomGlass)" opacity="0.74"/>
  <ellipse cx="600" cy="1203" rx="271" ry="45" stroke="#ffffff" stroke-opacity="0.72" stroke-width="5"/>
  <ellipse cx="600" cy="1214" rx="316" ry="72" stroke="#46535d" stroke-opacity="0.38" stroke-width="7"/>
  <ellipse cx="600" cy="1248" rx="285" ry="29" fill="#ffffff" opacity="0.13"/>

  <!-- Strong side highlights -->
  <path d="M332 357C327 490 324 835 331 1034C335 1137 367 1185 445 1209" stroke="url(#highlight)" stroke-width="14" stroke-linecap="round" opacity="0.78"/>
  <path d="M863 364C868 512 869 862 862 1041C858 1134 826 1178 758 1204" stroke="url(#rightHighlight)" stroke-width="10" stroke-linecap="round" opacity="0.58"/>
  <path d="M280 390C290 482 292 772 297 1038" stroke="#ffffff" stroke-opacity="0.52" stroke-width="4" stroke-linecap="round"/>
  <path d="M928 390C919 482 916 772 911 1038" stroke="#111820" stroke-opacity="0.38" stroke-width="4" stroke-linecap="round"/>

  <!-- Integrated graduation panel -->
  <g id="graduation-scale" opacity="0.86">
    <path d="M673 458H818" stroke="url(#scaleInk)" stroke-width="4" stroke-linecap="round"/>
    <path d="M673 458V963" stroke="url(#scaleInk)" stroke-width="4" stroke-linecap="round"/>
    <path d="M673 963H792" stroke="url(#scaleInk)" stroke-width="4" stroke-linecap="round"/>

    <g stroke="url(#scaleInk)" stroke-width="4" stroke-linecap="round">
      <path d="M673 458H785"/>
      <path d="M673 520H741"/>
      <path d="M673 582H785"/>
      <path d="M673 644H741"/>
      <path d="M673 706H785"/>
      <path d="M673 768H741"/>
      <path d="M673 830H785"/>
      <path d="M673 892H741"/>
      <path d="M673 954H785"/>
    </g>
    <g fill="#22282e" fill-opacity="0.78" font-family="Arial, Helvetica, sans-serif" font-weight="500">
      <text x="804" y="474" font-size="36">1000</text>
      <text x="808" y="512" font-size="18" letter-spacing="1.5">APPROX</text>
      <text x="806" y="598" font-size="36">800</text>
      <text x="806" y="722" font-size="36">600</text>
      <text x="806" y="846" font-size="36">400</text>
      <text x="806" y="970" font-size="36">200</text>
    </g>
  </g>

  <!-- 1000ml printed label, integrated not floating -->
  <g id="capacity-label" opacity="0.48">
    <rect x="352" y="745" width="172" height="118" rx="8" fill="#2b3339" fill-opacity="0.12"/>
    <text x="361" y="725" fill="#384047" fill-opacity="0.7" font-family="Arial, Helvetica, sans-serif" font-size="35" font-weight="500">1000 ml</text>
  </g>

  <!-- Front reflective glints -->
  <path d="M258 335C335 384 865 386 941 334" stroke="#ffffff" stroke-opacity="0.46" stroke-width="3"/>
  <path d="M299 1142C377 1215 807 1220 895 1144" stroke="#ffffff" stroke-opacity="0.38" stroke-width="4" stroke-linecap="round"/>
  <path d="M402 318C320 392 340 840 344 1095" stroke="#ffffff" stroke-opacity="0.30" stroke-width="3" stroke-linecap="round"/>
  <path d="M474 304C447 548 452 913 470 1128" stroke="#ffffff" stroke-opacity="0.14" stroke-width="7" stroke-linecap="round"/>
  <path d="M813 322C841 548 834 913 820 1128" stroke="#ffffff" stroke-opacity="0.13" stroke-width="7" stroke-linecap="round"/>

  <!-- Active outline hidden by default; Claude can toggle opacity/class -->
  <path id="active-outline" d="M242 320C222 324 200 333 178 351C214 354 245 350 275 335C264 333 252 329 242 320ZM260 331C271 473 274 789 283 1033C287 1158 307 1217 422 1248C463 1259 523 1264 600 1264C677 1264 737 1259 778 1248C893 1217 913 1158 917 1033C926 789 929 473 940 331C902 363 300 363 260 331Z" stroke="#38f5b2" stroke-width="8" stroke-opacity="0" fill="none" filter="url(#glassGlow)"/>
</svg>
